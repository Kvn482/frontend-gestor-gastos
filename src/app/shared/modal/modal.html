@if (isOpen || isClosing) {
<div class="fixed inset-0 z-50 flex justify-center items-center
    bg-black/50 overflow-y-auto overflow-x-hidden"
    [class.modal-fade-out]="isClosing"
    (click)="close()">

    <!-- Contenedor -->
    <div class="relative p-4 w-full max-w-2xl max-h-full modal-bounce" (click)="$event.stopPropagation()" [class.modal-slide-up]="isClosing">

        <!-- Modal -->
        <div class="relative bg-neutral-primary-soft dark:bg-slate-800 border border-default dark:border-slate-700
             rounded-base shadow-sm p-4 md:p-6">

            <!-- Header -->
            <div class="flex items-center justify-between border-b border-default dark:border-slate-700 pb-4 md:pb-5">

                <h3 class="text-lg font-medium text-heading dark:text-white">
                    {{ modalTitle }}
                </h3>

                <button type="button" (click)="close()" class="text-body dark:text-slate-400 bg-transparent hover:bg-neutral-tertiary dark:hover:bg-slate-700
                 hover:text-heading dark:hover:text-white rounded-base text-sm w-9 h-9
                 inline-flex justify-center items-center cursor-pointer">

                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>

                </button>
            </div>

            <!-- Body -->
            <div class="py-6">
                <ng-content></ng-content>
            </div>

        </div>
    </div>
</div>
}
