<button (click)="go()"
  class="group flex items-center gap-4
  p-5 rounded-2xl
  bg-white dark:bg-slate-800/70 border border-slate-100 dark:border-slate-700
  shadow-sm hover:shadow-md hover:border-indigo-100 dark:hover:border-indigo-700
  transition-all duration-200
  w-full cursor-pointer text-left">

  <!-- Icon container -->
  <div class="w-11 h-11 rounded-xl bg-indigo-50 dark:bg-indigo-900/30 flex items-center justify-center
    text-indigo-600 dark:text-indigo-400 group-hover:bg-indigo-600 group-hover:text-white
    transition-all duration-200 shrink-0">
    <ng-content select="[icon]"></ng-content>
  </div>

  <!-- Label -->
  <span class="flex-1 text-sm font-semibold text-gray-700 dark:text-slate-200 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">
    {{ label }}
  </span>

  <!-- Arrow -->
  <svg class="w-4 h-4 text-slate-300 dark:text-slate-600 group-hover:text-indigo-400 group-hover:translate-x-0.5 transition-all shrink-0"
    xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m9 5 7 7-7 7"/>
  </svg>

</button>
