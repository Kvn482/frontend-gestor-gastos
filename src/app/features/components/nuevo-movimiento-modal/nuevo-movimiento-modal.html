<app-modal #modal [isOpen]="isOpen" (closed)="closed.emit()" modalTitle="Nuevo Movimiento">

  <form class="w-full">

    <div class="mb-6">
      <div class="relative">
        <input type="email" id="email" name="email" placeholder=" "
          class="peer block w-full px-2.5 pb-2.5 pt-4 text-sm rounded-base appearance-none border focus:outline-none focus:ring-0" />

        <label for="email" class="absolute text-sm duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-neutral-primary px-2
            peer-placeholder-shown:scale-100
            peer-placeholder-shown:-translate-y-1/2
            peer-placeholder-shown:top-1/2
            peer-focus:top-2
            peer-focus:scale-75
            peer-focus:-translate-y-4
            start-1">
          Email
        </label>
      </div>

      <!-- @if (erroresValidacion().email) { -->
      <p class="mt-2 text-sm text-fg-danger-strong">
        <span class="font-medium">¡Error!</span> El email no puede estar vacio
      </p>
      <!-- } -->
    </div>

    <div class="mb-6">
      <label for="underline_select" class="sr-only">Tipo Movimiento</label>
      <select id="underline_select"
        class="block py-2.5 ps-0 w-full text-sm text-body bg-transparent border-0 border-b-2 border-default-medium appearance-none focus:outline-none focus:ring-0 focus:border-brand peer">
        <option selected>Choose a country</option>
        <option value="US">United States</option>
        <option value="CA">Canada</option>
        <option value="FR">France</option>
        <option value="DE">Germany</option>
      </select>
    </div>

    <div class="mb-6">
      <label for="underline_select" class="sr-only">Categoria</label>
      <select id="underline_select"
        class="block py-2.5 ps-0 w-full text-sm text-body bg-transparent border-0 border-b-2 border-default-medium appearance-none focus:outline-none focus:ring-0 focus:border-brand peer">
        <option selected>Choose a country</option>
        <option value="US">United States</option>
        <option value="CA">Canada</option>
        <option value="FR">France</option>
        <option value="DE">Germany</option>
      </select>
    </div>

    <div class="mb-6">
      <div class="relative z-0">
        <input type="text" id="standard_error" aria-describedby="standard_error_help"
          class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-danger appearance-none focus:outline-none focus:ring-0 focus:border-danger peer"
          placeholder=" " value="0" />
        <label for="standard_error"
          class="absolute text-sm text-fg-danger-strong duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto">Monto
        </label>
      </div>
      <p id="standard_error_help" class="mt-2 text-xs text-fg-danger-strong"><span class="font-medium">Oh,
          snapp!</span> Some error message.</p>
    </div>

    <div class="mb-6">
      <div class="relative z-0">
        <input type="text" id="standard_error" aria-describedby="standard_error_help"
          class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-danger appearance-none focus:outline-none focus:ring-0 focus:border-danger peer"
          placeholder=" " />
        <label for="standard_error"
          class="absolute text-sm text-fg-danger-strong duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto">Descripcion
        </label>
      </div>
      <p id="standard_error_help" class="mt-2 text-xs text-fg-danger-strong"><span class="font-medium">Oh,
          snapp!</span> Some error message.</p>
    </div>

    <div class="relative max-w-sm">
      <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
        <svg class="w-4 h-4 text-body" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 10h16m-8-3V4M7 7V4m10 3V4M5 20h14a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1H5a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1Zm3-7h.01v.01H8V13Zm4 0h.01v.01H12V13Zm4 0h.01v.01H16V13Zm-8 4h.01v.01H8V17Zm4 0h.01v.01H12V17Zm4 0h.01v.01H16V17Z" />
        </svg>
      </div>
      <input id="datepicker-autohide" datepicker datepicker-autohide type="text"
        class="block w-full ps-9 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand px-3 py-2.5 shadow-xs placeholder:text-body"
        placeholder="Select date">
    </div>

  </form>

  <div class="flex justify-end mt-6 space-x-4">
    <button (click)="modal.close()" class="text-body bg-neutral-secondary-medium border border-default-medium
      hover:bg-neutral-tertiary-medium hover:text-heading cursor-pointer
      rounded-base text-sm px-4 py-2.5">
      Cancelar
    </button>

    <button class="text-white bg-brand hover:bg-brand-strong cursor-pointer
      rounded-base text-sm px-4 py-2.5">
      Guardar
    </button>
  </div>

</app-modal>
