<h1>Login</h1>

<input
  [(ngModel)]="email"
  type="email"
  placeholder="Email"
/>

<input
  [(ngModel)]="password"
  type="password"
  placeholder="Password"
/>

<button (click)="login()" type="button" class="text-white bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">Iniciar sesión</button>

<p>
  ¿No tienes cuenta?
  <a routerLink="/register">Regístrate</a>
</p>

@if (errorMessage) {
  <p>
    {{ errorMessage }}
  </p>
}
