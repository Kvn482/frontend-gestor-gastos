<!-- Welcome -->
<div class="mb-8">
  <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Hola, <span class="text-indigo-600 dark:text-indigo-400">{{ nombre }}</span> 👋</h1>
  <p class="text-gray-400 dark:text-slate-500 text-sm mt-1">Bienvenido de vuelta a Monetra</p>
</div>

<!-- Balance -->
<div class="mb-6">
  <app-balance-general />
</div>

<!-- Acciones rápidas -->
<p class="text-xs font-semibold uppercase tracking-widest text-gray-400 dark:text-slate-500 mb-4">Acciones rápidas</p>
<div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">

  <!-- Nuevo Movimiento -->
  <app-quick-action label="Nuevo Movimiento" (action)="abrirModalMovimiento()">
    <svg icon class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M5 12h14m-7 7V5" />
    </svg>
  </app-quick-action>

  <!-- Mis Cuentas -->
  <app-quick-action label="Mis Cuentas" route="/cuentas">
    <svg icon class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
      <path fill-rule="evenodd"
        d="M12 14a3 3 0 0 1 3-3h4a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2h-4a3 3 0 0 1-3-3Zm3-1a1 1 0 1 0 0 2h4v-2h-4Z"
        clip-rule="evenodd" />
      <path fill-rule="evenodd"
        d="M12.293 3.293a1 1 0 0 1 1.414 0L16.414 6h-2.828l-1.293-1.293a1 1 0 0 1 0-1.414ZM12.414 6 9.707 3.293a1 1 0 0 0-1.414 0L5.586 6h6.828ZM4.586 7l-.056.055A2 2 0 0 0 3 9v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2h-4a5 5 0 0 1 0-10h4a2 2 0 0 0-1.53-1.945L17.414 7H4.586Z"
        clip-rule="evenodd" />
    </svg>
  </app-quick-action>

  <!-- Préstamos -->
  <app-quick-action label="Préstamos" route="/prestamos">
    <svg icon class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M3 10h18M6 14h2m3 0h5M3 7v10a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1Z" />
    </svg>
  </app-quick-action>

</div>

<!-- Movimientos -->
<p class="text-xs font-semibold uppercase tracking-widest text-gray-400 dark:text-slate-500 mb-4">Movimientos</p>
<div class="mb-6">
  <app-ultimos-movimientos></app-ultimos-movimientos>
</div>

<app-nuevo-movimiento-modal [isOpen]="modalMovimientoAbierto" (closed)="cerrarModalMovimiento()">
</app-nuevo-movimiento-modal>
