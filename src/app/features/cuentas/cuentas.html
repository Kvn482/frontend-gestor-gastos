<div class="mb-8 max-w-5xl">
  <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Cuentas</h1>
  <p class="text-gray-400 dark:text-slate-500 text-sm mt-1">Administra y personaliza tus cuentas disponibles.</p>
</div>

<p class="text-xs font-semibold uppercase tracking-widest text-gray-400 dark:text-slate-500 mb-4 max-w-5xl">Acciones rápidas</p>
<div class="grid grid-cols-1 md:grid-cols-1 lg:grid-cols-1 xl:grid-cols-2 2xl:grid-cols-4 gap-5 mb-10 max-w-400">

  <!-- Agregar Cuenta -->
  <app-quick-action label="Agregar Cuenta" (action)="abrirModalCrearCuenta()">
    <svg icon class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14m-7 7V5" />
    </svg>
  </app-quick-action>

  <!-- Transferir saldo -->
  <app-quick-action label="Transferir saldo" (action)="abrirModalTransferencia()">
    <svg icon class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M7 7h11m0 0-3-3m3 3-3 3M17 17H6m0 0 3 3m-3-3 3-3" />
    </svg>
  </app-quick-action>

  <!-- Analisis -->
  <app-quick-action label="Analisis" route="/analisis">
    <svg icon class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
      width="24" height="24" fill="none" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M3 15v4m6-6v6m6-4v4m6-6v6M3 11l6-5 6 5 5.5-5.5" />
    </svg>
  </app-quick-action>

</div>

<div class="grid gap-5 grid-cols-[repeat(auto-fit,minmax(350px,1fr))] max-w-400">
  @for (item of cuentas; track item.id) {
    <app-account-card
      [id]="item.id"
      [nombre]="item.nombre"
      [tipo]="item.tipo"
      [cantidad]="item.saldo_actual"
      [color]="item.color"
      [status]="item.status"
      (statusChanged)="onAccountStatusChange($event)"
      (transferRequested)="abrirModalTransferencia($event)"
    />
  }

</div>

<app-crear-cuenta-modal [isOpen]="modalAbierto" (closed)="cerrarModalCrearCuenta()">
</app-crear-cuenta-modal>

<app-transferir-saldo
  [isOpen]="modalTransferenciaAbierto"
  [cuentaOrigenId]="cuentaOrigenTransferencia"
  (closed)="cerrarModalTransferencia()">
</app-transferir-saldo>
