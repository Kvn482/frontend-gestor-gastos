<!-- Mobile toggle: solo visible cuando el sidebar está cerrado -->
@if (!sidebarOpen) {
<button (click)="sidebarOpen = true" type="button"
  class="fixed top-3 left-3 z-50 text-white bg-slate-800 hover:bg-slate-700 focus:ring-2 focus:ring-indigo-500 rounded-xl p-2 inline-flex sm:hidden">
  <span class="sr-only">Abrir sidebar</span>
  <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h10" />
  </svg>
</button>
}

<!-- Overlay oscuro en mobile -->
@if (sidebarOpen) {
<div class="fixed inset-0 z-30 bg-black/50 sm:hidden" (click)="sidebarOpen = false"></div>
}

<aside
  class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform sm:translate-x-0"
  [class.-translate-x-full]="!sidebarOpen"
  aria-label="Sidebar">
  <div class="h-full flex flex-col px-4 py-5 overflow-y-auto bg-slate-900">

    <!-- Botón cerrar (solo mobile) -->
    <div class="flex items-center justify-between mb-1 sm:mb-0">
      <button (click)="sidebarOpen = false" type="button"
        class="sm:hidden ml-auto text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl p-1.5 transition-colors">
        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Logo -->
    <div class="flex items-center gap-3 px-2 mb-8">
      <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 10h18M6 14h2m3 0h5M3 7v10a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1Z" />
        </svg>
      </div>
      <span class="text-white text-xl font-bold tracking-tight">Monetra</span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 space-y-1">
      <p class="text-slate-500 text-xs font-semibold uppercase tracking-widest px-3 mb-3">Principal</p>
      <a href="#" (click)="closeSidebar()"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white group transition-all duration-150">
        <svg class="w-5 h-5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M10 6.025A7.5 7.5 0 1 0 17.975 14H10V6.025Z" />
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13.5 3c-.169 0-.334.014-.5.025V11h7.975c.011-.166.025-.331.025-.5A7.5 7.5 0 0 0 13.5 3Z" />
        </svg>
        <span class="text-sm font-medium">Dashboard</span>
      </a>
      <a href="#" (click)="closeSidebar()"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white group transition-all duration-150">
        <svg class="w-5 h-5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 8H5m12 0a1 1 0 0 1 1 1v2.6M17 8l-4-4M5 8a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.6M5 8l4-4 4 4m6 4h-4a2 2 0 1 0 0 4h4a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1Z" />
        </svg>
        <span class="text-sm font-medium">Cuentas</span>
      </a>
      <a href="#" (click)="closeSidebar()"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white group transition-all duration-150">
        <svg class="w-5 h-5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 10h18M6 14h2m3 0h5M3 7v10a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1Z" />
        </svg>
        <span class="text-sm font-medium">Préstamos</span>
      </a>
    </nav>

    <!-- Bottom section -->
    <div class="border-t border-slate-700/60 pt-4 space-y-1">
      <!-- User profile -->
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-800 transition-all duration-150">
        <img [src]="profileImageUrl" class="w-8 h-8 rounded-full object-cover ring-2 ring-indigo-500/40" alt="avatar" />
        <div class="flex flex-col leading-tight overflow-hidden">
          <span class="text-white text-sm font-semibold truncate">{{ username }}</span>
          <span class="text-slate-400 text-xs">Mi cuenta</span>
        </div>
      </a>
      <!-- Settings -->
      <a href="#"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all duration-150">
        <svg class="w-5 h-5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 13v-2a1 1 0 0 0-1-1h-.757l-.707-1.707.535-.536a1 1 0 0 0 0-1.414l-1.414-1.414a1 1 0 0 0-1.414 0l-.536.535L14 4.757V4a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v.757l-1.707.707-.536-.535a1 1 0 0 0-1.414 0L4.929 6.343a1 1 0 0 0 0 1.414l.536.536L4.757 10H4a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h.757l.707 1.707-.535.536a1 1 0 0 0 0 1.414l1.414 1.414a1 1 0 0 0 1.414 0l.536-.535 1.707.707V20a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-.757l1.707-.708.536.536a1 1 0 0 0 1.414 0l1.414-1.414a1 1 0 0 0 0-1.414l-.535-.536.707-1.707H20a1 1 0 0 0 1-1Z" />
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
        </svg>
        <span class="text-sm font-medium">Configuración</span>
      </a>
      <!-- Dark mode toggle -->
      <button (click)="toggleDarkMode()" type="button"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white w-full transition-all duration-150">
        @if (darkMode) {
        <svg class="w-5 h-5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1Zm7.071 2.929a1 1 0 0 1 0 1.414l-.707.707a1 1 0 1 1-1.414-1.414l.707-.707a1 1 0 0 1 1.414 0ZM20 11h1a1 1 0 1 1 0 2h-1a1 1 0 1 1 0-2ZM17.657 16.243a1 1 0 0 1 1.414 1.414l-.707.707a1 1 0 0 1-1.414-1.414l.707-.707ZM12 18a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1ZM7.757 16.243l-.707.707a1 1 0 0 1-1.414-1.414l.707-.707a1 1 0 0 1 1.414 1.414ZM4 11H3a1 1 0 1 1 0 2h1a1 1 0 1 1 0-2ZM6.343 4.929l-.707-.707a1 1 0 0 0-1.414 1.414l.707.707a1 1 0 0 0 1.414-1.414ZM12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7Z"/>
        </svg>
        <span class="text-sm font-medium">Modo claro</span>
        } @else {
        <svg class="w-5 h-5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 22c5.523 0 10-4.477 10-10 0-.463-.694-.54-.933-.143a6.5 6.5 0 1 1-8.924-8.924C12.54 2.694 12.463 2 12 2 6.477 2 2 6.477 2 12s4.477 10 10 10Z"/>
        </svg>
        <span class="text-sm font-medium">Modo oscuro</span>
        }
      </button>

      <!-- Logout -->
      <a href="#" (click)="logout()"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-rose-500/10 hover:text-rose-400 transition-all duration-150">
        <svg class="w-5 h-5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 12H4m12 0-4 4m4-4-4-4m3-4h2a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3h-2" />
        </svg>
        <span class="text-sm font-medium">Cerrar sesión</span>
      </a>
    </div>

  </div>
</aside>

<!-- Main content -->
<div class="sm:ml-64 min-h-screen bg-slate-50 dark:bg-slate-950 transition-colors duration-200">
  <div class="p-6 pt-16 sm:pt-6 md:p-8 max-w-5xl">
    <router-outlet />
  </div>
</div>
